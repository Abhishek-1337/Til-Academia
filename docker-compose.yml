services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: til
      POSTGRES_PASSWORD: tilpass
      POSTGRES_DB: til_academia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U til -d til_academia"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://til:tilpass@db:5432/til_academia?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
